# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/music_library
spring.datasource.username=music_library
spring.datasource.password=music_library
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Server configuration
server.port=8080

# Optional: Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Flyway auto-configuration
spring.flyway.enabled=false