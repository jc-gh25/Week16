spring:
  datasource:
    url: jdbc:mysql://localhost:3306/music_library
    username: music_library
    password: music_library
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # safe for fresh DBs; makes Flyway create a baseline version if the DB is empty,
    # preventing “no migration applied” error on a new Railway MySQL instance
  jpa:
    defer-datasource-initialization: true   # postpone JPA until after Flyway
    hibernate:
      ddl-auto: update
      # update - creates/updates tables automatically
      # none - Hibernate will not touch the DB schema. Create/modify tables with MySQL Workbench.
      # validate - only checks that the schema matches the entities
    show-sql: true
  sql:
    init:
      mode: never 
         # never if not loading .sql scripts at startup
  springdoc:
  api-docs:
    path: /v3/api-docs  # default, just being explicit
  swagger-ui:
    enabled: true
    path: /swagger-ui.html  # default UI entry point
    # Optional: hide the “try it out” button for endpoints that require authorization
    # try-it-out-enabled: false
         