# -------------------------------------------------------------
# Spring Boot configuration for Railway (MySQL free tier)
# -----------------------------------------------------
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Username & password are taken from the separate env vars
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false   # ISO 8601 strings
      DATE_FORMAT: yyyy-MM-dd'T'HH:mm:ss.SSSXXX  

  # --------------------------------------------------------
  # JPA / Hibernate – let Hibernate create/update tables automatically
  # -------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update          # let Hibernate create/update tables automatically
    show-sql: true             # prints SQL statements to the console (debug)

  # --------------------------------------------------
  # Flyway – disabled for now (can enable later)
  # --------------------------------------------------
  flyway:
   enabled: false

  # ------------------------------------------------------
  # Springdoc / Swagger UI (optional but handy for testing)
  # --------------------------------------------------
  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      enabled: true
      path: /swagger-ui.html

# ---------------------------------------------------------
# Prevent Spring from executing any plain .sql scripts at startup
# ---------------------------------------------------------
sql:
  init:
    mode: never