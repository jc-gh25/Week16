# -------------------------------------------------------------
# Spring Boot configuration for Railway (MySQL free tier)
# -----------------------------------------------------
server:
  port: ${PORT:8080}  # Use Railway's dynamic PORT, fallback to 8080 locally

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=true&requireSSL=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Username & password are taken from the separate env vars
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  # --------------------------------------------------------
  # JPA / Hibernate – Flyway will manage schema, so use validate
  # -------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema, Hibernate only validates
    show-sql: true                # prints SQL statements to the console (debug)

  # --------------------------------------------------
  # Flyway – ENABLED for database migrations
  # --------------------------------------------------
  flyway:
    enabled: true                 # Enable Flyway for schema and data management
    locations: classpath:db/migration  # Location of migration scripts

  # ------------------------------------------------------
  # Springdoc / Swagger UI (optional but handy for testing)
  # --------------------------------------------------
  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      enabled: true
      path: /swagger-ui.html
      cors-enabled: true      # THIS ENABLES CORS for /v3/api-docs
      # (optional) force the public base URL – uncomment if you need it
      servers:
        - url: https://javabc.up.railway.app

# ---------------------------------------------------------
# Prevent Spring from executing any plain .sql scripts at startup
# ---------------------------------------------------------
sql:
  init:
    mode: never
