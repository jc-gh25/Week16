# -------------------------------------------------------------
# Spring Boot configuration – Railway + MySQL (free tier)
# -------------------------------------------------------------
spring:
  datasource:
    # Railway injects DATABASE_URL automatically.
    # Example value: mysql://user:pass@host:3306/music_library
    # We turn it into a JDBC URL and turn off SSL for the free tier.
    url: ${DATABASE_URL}?useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ----------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------
  jpa:
    # Let Flyway run first, then start JPA. This breaks the circular‑depends‑on.
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none          # Flyway will create the schema; Hibernate must not.
    show-sql: true           # Prints SQL to the console (helpful for debugging)

  # ------------------------------------------------------
  # Flyway – database migrations (optional, keep if you have *.sql files)
  # --------------------------------------------------
  flyway:
    enabled: true
    baseline-on-migrate: true          # Safe for a brand‑new DB
    locations: classpath:db/migration   # Default location; keep it or change as needed

  # ------------------------------------------------------
  # Springdoc / Swagger UI (nice for manual testing)
  # ---------------------------------------------------------
  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      enabled: true
      path: /swagger-ui.html

# ----------------------------------------------
# Miscellaneous – we don’t want Spring to run any plain .sql scripts at startup
# ---------------------------------------------------------
sql:
  init:
    mode: never